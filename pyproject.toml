[tool.basedpyright]
# Configuración para basedpyright
pythonVersion = "3.11"
include = ["**/*.py"]
exclude = [
    "**/node_modules",
    "**/__pycache__",
    "**/migrations",
    "**/venv",
    "**/.venv",
    "**/RESPALDO_*",
    "**/backup_*",
    "**/*.backup"
]

# Configuración de rutas de importación
extraPaths = [
    ".",
    "venv/Scripts",
    "modules",
    "modules/tributario",
    "modules/core",
    "modules/usuarios",
    "modules/administrativo",
    "modules/catastro",
    "modules/configuracion"
]

# Configuración de reportes más conservadora
reportMissingImports = "none"
reportMissingTypeStubs = "none"
reportUnknownMemberType = "none"
reportUnknownArgumentType = "none"
reportUnknownVariableType = "none"
reportGeneralTypeIssues = "none"
reportOptionalMemberAccess = "none"
reportOptionalSubscript = "none"
reportPrivateImportUsage = "none"
reportMissingModuleSource = "none"
reportMissingSuperCall = "none"
reportIncompatibleMethodOverride = "none"
reportIncompatibleVariableOverride = "none"

# Configuración de rendimiento
analysis = { autoSearchPaths = true, diagnosticMode = "openFilesOnly" }

[tool.pyright]
# Configuración heredada de basedpyright
pythonVersion = "3.11"
include = ["**/*.py"]
exclude = [
    "**/node_modules",
    "**/__pycache__",
    "**/migrations",
    "**/venv",
    "**/.venv"
]

extraPaths = [
    ".",
    "venv/Scripts",
    "modules",
    "modules/tributario",
    "modules/core",
    "modules/usuarios",
    "modules/administrativo",
    "modules/catastro",
    "modules/configuracion"
]

reportMissingImports = "warning"
reportMissingTypeStubs = "none"
reportUnknownMemberType = "none"
reportUnknownArgumentType = "none"
reportUnknownVariableType = "none"
reportGeneralTypeIssues = "none"
reportOptionalMemberAccess = "none"
reportOptionalSubscript = "none"
reportPrivateImportUsage = "none"
reportMissingModuleSource = "none"
reportMissingSuperCall = "none"
reportIncompatibleMethodOverride = "none"
reportIncompatibleVariableOverride = "none"


