<!DOCTYPE html>
<html>
<head>
    <title>Test Template</title>
</head>
<body>
    <h1>Test: Sección CLASIFICACION DEL SUELO</h1>
    
    <!-- Sección de CLASIFICACION DEL SUELO -->
    <div class="row mt-4" style="display: block !important; visibility: visible !important;">
        <div class="col-md-12">
            <div class="card border-warning shadow-sm" style="display: block !important; visibility: visible !important;">
                <div class="card-header bg-warning text-dark" style="background-color: #ffc107 !important;">
                    <h5 class="mb-0" style="font-weight: bold !important; font-size: 1.2em !important;">
                        <i class="fas fa-layer-group me-2"></i>CLASIFICACION DEL SUELO
                    </h5>
                </div>
                <div class="card-body" style="display: block !important; visibility: visible !important;">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Empresa</label>
                            <input type="text" name="suelo-empresa" id="suelo-empresa" class="form-control" value="TEST" readonly style="display: block !important;">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Código Factor (codfac)</label>
                            <input type="text" name="suelo-codfac" id="suelo-codfac" class="form-control" maxlength="3" placeholder="Código Factor" style="display: block !important;">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Factor (fac)</label>
                            <input type="number" name="suelo-fac" id="suelo-fac" class="form-control text-end" step="0.001" placeholder="0.000" value="0.000" style="display: block !important;">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Área Factor (facarea)</label>
                            <input type="number" name="suelo-facarea" id="suelo-facarea" class="form-control text-end" step="0.01" placeholder="0.00" value="0.00" style="display: block !important;">
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Monto</label>
                            <input type="number" name="suelo-monto" id="suelo-monto" class="form-control text-end" step="0.01" placeholder="0.00" value="0.00" style="display: block !important;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <p>Si puedes ver esta sección arriba, el HTML está correcto.</p>
</body>
</html>
