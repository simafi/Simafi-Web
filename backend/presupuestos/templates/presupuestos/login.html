<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ modulo|default:"Presupuestos" }} - SIMAFI Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 520px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 2rem;
        }
        .login-header .logo {
            font-size: 2.5rem;
            margin-bottom: .75rem;
        }
        .login-body {
            padding: 2rem 2rem;
        }
        .btn-presu {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo"><i class="fas fa-chart-pie"></i></div>
            <h4 class="mb-0">Módulo Presupuestos</h4>
            <p class="mb-0 mt-2" style="opacity:.9">{{ descripcion }}</p>
        </div>
        <div class="login-body">
            <div class="alert alert-info">
                <i class="fas fa-info-circle me-1"></i>
                Este módulo se está implementando. Puede acceder al menú principal para comenzar.
            </div>
            <a class="btn btn-presu w-100" href="{% url 'presupuestos:presupuestos_menu_principal' %}">
                <i class="fas fa-arrow-right me-2"></i>Ir al menú de Presupuestos
            </a>
            <div class="mt-3 text-center">
                <a class="text-muted text-decoration-none" href="{% url 'modules_core:menu_principal' %}">
                    <i class="fas fa-th-large me-1"></i>Volver al menú principal
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
