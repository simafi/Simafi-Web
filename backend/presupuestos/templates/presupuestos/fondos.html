<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fondos - Presupuestos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Fondos</h4>
    <a href="{% url 'presupuestos:presupuestos_menu_principal' %}" class="btn btn-outline-secondary btn-sm">Volver</a>
  </div>
  <div class="row g-3">
    <div class="col-md-4">
      <div class="card"><div class="card-body">
        <h6>Nuevo Fondo</h6>
        <form method="post">{% csrf_token %}
          <div class="mb-2"><label class="form-label">Código</label>{{ form.codigo }}</div>
          <div class="mb-2"><label class="form-label">Nombre</label>{{ form.nombre }}</div>
          <div class="mb-2"><label class="form-label">Descripción</label>{{ form.descripcion }}</div>
          {{ form.empresa }}
          <button class="btn btn-primary btn-sm" type="submit">Guardar</button>
        </form>
      </div></div>
    </div>
    <div class="col-md-8">
      <div class="card"><div class="card-body p-0">
        <table class="table table-sm mb-0">
          <thead><tr><th>Código</th><th>Nombre</th><th>Descripción</th></tr></thead>
          <tbody>
          {% for i in items %}
            <tr><td><code>{{ i.codigo }}</code></td><td>{{ i.nombre }}</td><td>{{ i.descripcion }}</td></tr>
          {% empty %}
            <tr><td colspan="3" class="text-center text-muted py-3">Sin fondos</td></tr>
          {% endfor %}
          </tbody>
        </table>
      </div></div>
    </div>
  </div>
</div>
</body>
</html>
