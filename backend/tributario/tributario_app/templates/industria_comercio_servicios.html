<!DOCTYPE html>
<html>
<head>
    <title>Industria, Comercio y Servicios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: linear-gradient(135deg, #e0e7ef 0%, #f8fafc 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 4rem auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(37,99,235,0.10);
            padding: 2.5rem 2rem 2rem 2rem;
            border: 1px solid #e5e7eb;
        }
        h2 {
            color: #1e293b;
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 2.1rem;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .submenu {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 1.5rem;
        }
        .submenu-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 1.2rem;
            background: #f8fafc;
            color: #1e293b;
            border-radius: 10px;
            font-size: 1.13rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.18s, color 0.18s, box-shadow 0.18s, transform 0.18s;
            box-shadow: 0 2px 8px rgba(37,99,235,0.04);
            border: 1px solid #e5e7eb;
        }
        .submenu-link:hover {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 4px 16px rgba(37,99,235,0.13);
            transform: translateY(-2px) scale(1.03);
        }
        .submenu-link svg {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
            fill: #2563eb;
            transition: fill 0.18s;
        }
        .submenu-link:hover svg {
            fill: #fff;
        }
        .submenu-link.back {
            background: #e5e7eb;
            color: #2563eb;
            border: 1px solid #cbd5e1;
        }
        .submenu-link.back:hover {
            background: #2563eb;
            color: #fff;
        }
        @media (max-width: 600px) {
            .container {
                padding: 1.2rem 0.5rem 1rem 0.5rem;
            }
            h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Industria, Comercio y Servicios</h2>
        <div class="submenu">
            <a href="{% url 'industrias' %}" class="submenu-link">
                <svg viewBox="0 0 24 24"><path d="M3 21V8.25l5.25 3.5V8.25l5.25 3.5V8.25L19.5 12V21H3zm2-2h2v-2H5v2zm4 0h2v-2H9v2zm4 0h2v-2h-2v2z"/></svg>
                Industrias
            </a>
            <a href="{% url 'comercios' %}" class="submenu-link">
                <svg viewBox="0 0 24 24"><path d="M3 9l1.5 9h15L21 9H3zm2.5-6h13l1.5 6H4L5.5 3z"/></svg>
                Comercios
            </a>
            <a href="{% url 'servicios' %}" class="submenu-link">
                <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 3.87-3.13 7-7 7s-7-3.13-7-7a7 7 0 017-7zm0 16c4.41 0 8 1.79 8 4v2H4v-2c0-2.21 3.59-4 8-4z"/></svg>
                Servicios
            </a>
            <a href="{% url 'tributario:tributario_menu_principal' %}" class="submenu-link back">
                <svg viewBox="0 0 24 24"><path d="M10 19l-7-7 7-7v4h8v6h-8v4z"/></svg>
                Volver al Menú Principal
            </a>
        </div>
    </div>
</body>
</html>
