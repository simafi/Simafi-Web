<!DOCTYPE html>
<html>
<head>
    <title>Bienes Inmuebles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: linear-gradient(135deg, #e0e7ef 0%, #f8fafc 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 4rem auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(37,99,235,0.10);
            padding: 2.5rem 2rem 2rem 2rem;
            border: 1px solid #e5e7eb;
        }
        h2 {
            color: #1e293b;
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 2.1rem;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .submenu {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 1.5rem;
        }
        .submenu-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 1.2rem;
            background: #f8fafc;
            color: #1e293b;
            border-radius: 10px;
            font-size: 1.13rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.18s, color 0.18s, box-shadow 0.18s, transform 0.18s;
            box-shadow: 0 2px 8px rgba(37,99,235,0.04);
            border: 1px solid #e5e7eb;
        }
        .submenu-link:hover {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 4px 16px rgba(37,99,235,0.13);
            transform: translateY(-2px) scale(1.03);
        }
        .submenu-link svg {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
            fill: #2563eb;
            transition: fill 0.18s;
        }
        .submenu-link:hover svg {
            fill: #fff;
        }
        .submenu-link.back {
            background: #e5e7eb;
            color: #2563eb;
            border: 1px solid #cbd5e1;
        }
        .submenu-link.back:hover {
            background: #2563eb;
            color: #fff;
        }
        @media (max-width: 600px) {
            .container {
                padding: 1.2rem 0.5rem 1rem 0.5rem;
            }
            h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Bienes Inmuebles</h2>
        <div class="submenu">
            <a href="{% url 'tributario_app:gestionar_mora_bienes' %}" class="submenu-link">
                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.64-2.25 1.64-1.74 0-2.1-.96-2.17-1.92H8c.08 1.84 1.48 2.97 3.09 3.31V19h2.34v-1.63c1.97-.28 2.97-1.41 2.97-2.91 0-1.98-1.58-2.67-4.09-3.32z"/></svg>
                Gestión de Mora
            </a>
            
            <a href="{% url 'tributario_app:tributario_menu_principal' %}" class="submenu-link back">
                <svg viewBox="0 0 24 24"><path d="M10 19l-7-7 7-7v4h8v6h-8v4z"/></svg>
                Volver al Menú Principal
            </a>
        </div>
    </div>
</body>
</html>
