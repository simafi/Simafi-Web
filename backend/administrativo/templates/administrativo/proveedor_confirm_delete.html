{% extends "administrativo/base.html" %}
{% block content %}
<h1 class="h4 mb-3">{{ titulo }}</h1>
<p>¿Eliminar el proveedor <strong>{{ object.razon_social }}</strong>?</p>
<form method="post">{% csrf_token %}
	<button type="submit" class="btn btn-danger">Sí, eliminar</button>
	<a href="{% url 'administrativo:proveedor_list' %}" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
