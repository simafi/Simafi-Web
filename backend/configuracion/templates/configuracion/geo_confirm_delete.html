<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ titulo }}</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">
	<nav class="navbar navbar-light" style="background: rgba(255,255,255,0.95) !important;">
		<div class="container">
			<a class="navbar-brand" href="{% url 'configuracion:sistema_general_menu' %}">Configuración general</a>
		</div>
	</nav>
	<div class="container my-4">
		<div class="card shadow-lg">
			<div class="card-header bg-danger text-white">
				<h5 class="mb-0"><i class="fas fa-trash me-2"></i>{{ titulo }}</h5>
			</div>
			<div class="card-body">
				<p>¿Confirma eliminar el siguiente registro?</p>
				<p class="fw-bold">{{ label }}</p>
				<form method="post">
					{% csrf_token %}
					<button type="submit" class="btn btn-danger"><i class="fas fa-trash me-1"></i> Eliminar</button>
					<a href="{% if catalogo_clave %}{% url list_url clave=catalogo_clave %}{% else %}{% url list_url %}{% endif %}{{ extra_querystring|default:'' }}" class="btn btn-secondary">Cancelar</a>
				</form>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
