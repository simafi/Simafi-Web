<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <style>
        html, body { height: 100%; margin: 0; }
        .layout { display: flex; flex-direction: column; height: 100vh; }
        .toolbar { flex: 0 0 auto; z-index: 2000; }
        #map { flex: 1 1 auto; min-height: 0; width: 100%; }
        .leaflet-container { font-family: system-ui, sans-serif; }
    </style>
</head>
<body>
{% csrf_token %}
{{ capas_info|json_script:"capas-data" }}
<div class="layout">
    <nav class="toolbar navbar navbar-dark bg-dark px-3 py-2 shadow-sm">
        <div class="d-flex flex-wrap align-items-center gap-2 w-100">
            <a class="btn btn-outline-light btn-sm" href="{% url 'catastro:mapas_simafi_list' %}"><i class="fas fa-arrow-left"></i> Proyectos</a>
            <span class="navbar-text text-white ms-2">{{ proyecto.nombre }}</span>
            <div class="ms-auto d-flex flex-wrap align-items-center gap-2">
                <label class="text-white-50 small mb-0 me-1">Capa activa</label>
                <select id="capaActiva" class="form-select form-select-sm" style="width: auto; min-width: 160px;">
                    {% for c in capas %}
                    <option value="{{ c.id }}">{{ c.nombre }}</option>
                    {% empty %}
                    <option value="">— se creará al guardar —</option>
                    {% endfor %}
                </select>
                <button type="button" id="btnNuevaCapa" class="btn btn-sm btn-outline-light">Nueva capa</button>
                <span class="text-white-50 small"><i class="fas fa-user"></i> {{ usuario_nombre }}</span>
            </div>
        </div>
    </nav>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script>
(function () {
    const proyectoId = {{ proyecto.id }};
    const geojsonUrl = "{% url 'catastro:api_mapas_geojson' proyecto.id %}";
    const guardarUrl = "{% url 'catastro:api_mapas_elemento_guardar' proyecto.id %}";
    const eliminarUrl = "{% url 'catastro:api_mapas_elemento_eliminar' proyecto.id %}";
    const capaCrearUrl = "{% url 'catastro:api_mapas_capa_crear' proyecto.id %}";

    function getCookie(name) {
        const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
        return v ? decodeURIComponent(v[2]) : '';
    }
    const csrfToken = getCookie('csrftoken') || document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';

    const capasPorId = {};
    try {
        const arr = JSON.parse(document.getElementById('capas-data').textContent);
        arr.forEach(function (c) { capasPorId[c.id] = c; });
    } catch (e) { console.warn(e); }

    function styleForCapa(capaId) {
        const c = capasPorId[capaId] || {};
        const line = c.color_linea || '#2563eb';
        const fill = c.color_relleno || '#2563eb';
        const op = typeof c.opacidad_relleno === 'number' ? c.opacidad_relleno : 0.25;
        return { color: line, weight: 2, fillColor: fill, fillOpacity: op };
    }

    function capaIdSeleccionada() {
        const sel = document.getElementById('capaActiva');
        const v = sel.value;
        return v ? parseInt(v, 10) : null;
    }

    const map = L.map('map').setView([14.5, -87.0], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
        draw: {
            marker: true,
            polyline: { shapeOptions: { weight: 3 } },
            polygon: { allowIntersection: false, showArea: true },
            rectangle: true,
            circle: false,
            circlemarker: false,
        },
        edit: { featureGroup: drawnItems, remove: true },
    });
    map.addControl(drawControl);

    fetch(geojsonUrl, { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (fc) {
            if (!fc.features || !fc.features.length) return;
            L.geoJSON(fc, {
                style: function (feat) {
                    return styleForCapa(feat.properties && feat.properties._capa_id);
                },
                onEachFeature: function (feat, layer) {
                    if (!layer.feature) layer.feature = feat;
                    drawnItems.addLayer(layer);
                },
            });
            try {
                map.fitBounds(drawnItems.getBounds(), { padding: [40, 40], maxZoom: 17 });
            } catch (e) { /* empty */ }
        })
        .catch(function (e) { console.error(e); });

    function guardarElemento(layer, esNuevo) {
        const gj = layer.feature || layer.toGeoJSON();
        const geom = gj.geometry;
        if (!geom) return Promise.reject(new Error('Sin geometría'));
        const props = gj.properties || {};
        const pid = props._elemento_id;
        const body = {
            capa_id: capaIdSeleccionada(),
            elemento_id: esNuevo ? null : pid,
            geometry: geom,
            etiqueta: props.etiqueta || '',
            properties: props,
        };
        return fetch(guardarUrl, {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify(body),
        }).then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        }).then(function (data) {
            if (!data.ok) throw new Error(data.error || 'Error');
            gj.properties = gj.properties || {};
            gj.properties._elemento_id = data.elemento_id;
            gj.properties._capa_id = data.capa_id;
            layer.feature = gj;
            if (!capasPorId[data.capa_id]) {
                capasPorId[data.capa_id] = { id: data.capa_id, color_linea: '#2563eb', color_relleno: '#2563eb', opacidad_relleno: 0.25 };
            }
            return data;
        });
    }

    map.on(L.Draw.Event.CREATED, function (e) {
        const layer = e.layer;
        const gj = layer.toGeoJSON();
        layer.feature = gj;
        guardarElemento(layer, true).then(function () {
            drawnItems.addLayer(layer);
        }).catch(function (err) {
            alert('No se pudo guardar: ' + err.message);
        });
    });

    map.on(L.Draw.Event.EDITED, function (e) {
        const layers = e.layers;
        layers.eachLayer(function (layer) {
            guardarElemento(layer, false).catch(function (err) {
                alert('Error al actualizar: ' + err.message);
            });
        });
    });

    map.on(L.Draw.Event.DELETED, function (e) {
        const layers = e.layers;
        layers.eachLayer(function (layer) {
            const id = layer.feature && layer.feature.properties && layer.feature.properties._elemento_id;
            if (!id) return;
            fetch(eliminarUrl, {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken,
                },
                body: JSON.stringify({ elemento_id: id }),
            }).then(function (r) { return r.json(); }).catch(function (err) { console.error(err); });
        });
    });

    document.getElementById('btnNuevaCapa').addEventListener('click', function () {
        const nombre = window.prompt('Nombre de la nueva capa', 'Nueva capa');
        if (!nombre) return;
        fetch(capaCrearUrl, {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify({ nombre: nombre.trim() }),
        })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data.ok) throw new Error(data.error || 'Error');
                capasPorId[data.capa_id] = {
                    id: data.capa_id,
                    nombre: data.nombre,
                    color_linea: '#2563eb',
                    color_relleno: '#2563eb',
                    opacidad_relleno: 0.25,
                };
                const sel = document.getElementById('capaActiva');
                const opt = document.createElement('option');
                opt.value = data.capa_id;
                opt.textContent = data.nombre;
                sel.appendChild(opt);
                sel.value = String(data.capa_id);
            })
            .catch(function (e) { alert(e.message); });
    });
})();
</script>
</body>
</html>
