<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ titulo }}</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">
	<nav class="navbar navbar-expand-lg navbar-light" style="background: rgba(255,255,255,0.95) !important;">
		<div class="container">
			<a class="navbar-brand" href="{% url 'catastro:catastro_configuracion' %}">
				<i class="fas fa-map-marked-alt"></i> Sistema Catastro
			</a>
			<div class="navbar-nav ms-auto">
				<span class="navbar-text me-3">
					<i class="fas fa-user"></i> {{ request.session.catastro_usuario_nombre|default:"Usuario" }}
				</span>
				<a href="{% url 'catastro:catastro_logout' %}" class="btn btn-outline-danger btn-sm">
					<i class="fas fa-sign-out-alt"></i> Salir
				</a>
			</div>
		</div>
	</nav>
	<div class="container my-4">
		<div class="card shadow-lg">
			<div class="card-header bg-danger text-white">
				<h5 class="mb-0">
					<i class="fas fa-exclamation-triangle me-2"></i>{{ titulo }}
				</h5>
			</div>
			<div class="card-body">
				<div class="alert alert-warning">
					<i class="fas fa-exclamation-triangle me-2"></i>
					<strong>¿Está seguro de eliminar este uso de edificación?</strong>
				</div>

				<!-- Información del uso de edificación -->
				<div class="card border-primary mb-4">
					<div class="card-header bg-light">
						<strong>Información del Uso de Edificación</strong>
					</div>
					<div class="card-body">
						<div class="row">
							<div class="col-md-6">
								<p><strong>ID:</strong> {{ uso.id }}</p>
								<p><strong>Código:</strong> {{ uso.codigo }}</p>
							</div>
							<div class="col-md-6">
								<p><strong>Descripción:</strong> {{ uso.descripcion }}</p>
							</div>
						</div>
					</div>
				</div>

				<!-- Formulario de confirmación -->
				<form method="post">
					{% csrf_token %}
					<div class="d-flex justify-content-between">
						<a href="{% url 'catastro:usos_edifica_list' %}" class="btn btn-secondary">
							<i class="fas fa-arrow-left me-1"></i> Cancelar
						</a>
						<button type="submit" class="btn btn-danger">
							<i class="fas fa-trash me-1"></i> Sí, eliminar
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
