<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }} - Tesorería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background:#f6f8fc; }
        .content { padding: 2rem 0; }
        .card-simafi { border-radius: 14px; box-shadow: 0 8px 20px rgba(0,0,0,.03); }
    </style>
</head>
<body>
    <div class="container content">
        <div class="mb-3 d-flex align-items-center justify-content-between">
            <h4 class="mb-0"><i class="fas fa-file-alt me-2"></i>{{ titulo }}</h4>
            <a href="{% url 'tesoreria:cuentas_tesoreria' %}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left me-1"></i>Volver
            </a>
        </div>

        <div class="card card-simafi">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Tipo</label>
                            {{ form.tipo }}
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Código</label>
                            {{ form.codigo }}
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Nombre</label>
                            {{ form.nombre }}
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Cuenta contable del catálogo</label>
                            {{ form.cuenta_contable }}
                            {% if form.cuenta_contable.errors %}
                                <div class="text-danger small mt-1">{{ form.cuenta_contable.errors.0 }}</div>
                            {% endif %}
                        </div>
                        <div class="col-md-4">
                            {{ form.empresa }}
                        </div>
                    </div>

                    <hr>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i>Guardar
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
